name: Build docker image
description: 'Build docker image and upload as artifact'

inputs:
  project-name-root:
    description: The name of the project for this build
    required: true
  dockerfile-name-root:
    description: The name of the dockerfile to use
    required: true
  image-name-root:
    description: The name of the docker image to generate
    required: true
  service-type:
    description: The type of service being deployed
    required: true
  version-number:
    description: The version to give to nuget packages
    required: true

runs:
  using: "composite"
  steps:
  - uses: actions/checkout@v6

  - name: Setup .Net
    uses: actions/setup-dotnet@v5
    with:
      dotnet-version: 10.0.x
      source-url: https://nuget.pkg.github.com/sming-code/index.json
    env:
      NUGET_AUTH_TOKEN: ${{ github.token }}

  - name: Get lower case service type
    id: lower-case-service-type
    shell: bash
    run: echo "service-type-lower=${SERVICE_TYPE,,}" >> $GITHUB_OUTPUT
    env:
      SERVICE_TYPE: ${{ inputs.service-type }}

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v4

  - name: Repoint dockerfile to point to correct project (needed particularly for entrypoint)
    shell: bash
    run: sed -i -E 's/\$Project_Name/${{ inputs.project-name-root }}.${{ inputs.service-type }}/g' "${{ inputs.dockerfile-name-root }}.${{ steps.lower-case-service-type.outputs.service-type-lower }}"

  - name: Build docker image
    uses: docker/build-push-action@v7
    with:
      context: .
      file: ${{ inputs.dockerfile-name-root }}.${{ steps.lower-case-service-type.outputs.service-type-lower }}
      build-args: |
        Nuget_CustomFeedUserName=USERNAME
        Nuget_CustomFeedPassword=${{ github.token }}
      tags: |
        ${{ inputs.image-name-root }}-${{ steps.lower-case-service-type.outputs.service-type-lower }}:${{ inputs.version-number }}
      outputs: type=docker,dest=${{ runner.temp }}/docker-image.tar

  - name: Load image
    shell: bash
    run: |
      docker load --input ${{ runner.temp }}/docker-image.tar
      docker image ls -a

  - name: Publish to GPR
    shell: bash
    run: |
      docker tag ${{ inputs.image-name-root }}:${{ inputs.version-number }} ghcr.io/sming-code/${{ inputs.image-name-root }}:latest
      docker tag ${{ inputs.image-name-root }}:${{ inputs.version-number }} ghcr.io/sming-code/${{ inputs.image-name-root }}:${{ inputs.version-number }}
      docker push ghcr.io/sming-code/${{ inputs.image-name-root }}:latest
      docker push ghcr.io/sming-code/${{ inputs.image-name-root }}:${{ inputs.version-number }}

