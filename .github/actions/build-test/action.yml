name: Build and test
description: 'Build and test all dotnet projects in this repo based on an slnx file'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - name: Setup .Net
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        source-url: https://nuget.pkg.github.com/sming-code/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ github.token }}

    - name: Restore dependencies
      shell: bash
      run: dotnet restore

    - name: Build
      shell: bash
      run: dotnet build --no-restore

    - name: Test
      shell: bash
      run: dotnet test --no-build
